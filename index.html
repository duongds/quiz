<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn tập — Miễn dịch học (MDLS)</title>
<style>
:root {
  --paper: #F4EFE3;
  --card: #FBF8EF;
  --ink: #1B1E26;
  --ink-soft: #5A5E68;
  --hairline: #D5CDB8;
  --hairline-strong: #B8AE94;
  --muted: #8B8474;
  --accent: #2E6B47;
  --accent-soft: #DDE7D4;
  --accent-tint: #EEF2E5;
  --wrong: #A54934;
  --wrong-soft: #EED9CE;
  --wrong-tint: #F6E8DE;
  --chip: #E7DEC8;
  --chip-active: #1B1E26;
  --chip-active-ink: #F4EFE3;
  --focus: #2E6B47;
}
@media (prefers-color-scheme: dark) {
  :root {
    --paper: #12151D;
    --card: #171B25;
    --ink: #EBE4D3;
    --ink-soft: #9A968A;
    --hairline: #262A36;
    --hairline-strong: #383D4B;
    --muted: #6A665A;
    --accent: #7AB693;
    --accent-soft: #1F2B23;
    --accent-tint: #1A241E;
    --wrong: #D07E67;
    --wrong-soft: #2E1D19;
    --wrong-tint: #241612;
    --chip: #21252F;
    --chip-active: #EBE4D3;
    --chip-active-ink: #12151D;
    --focus: #7AB693;
  }
}
:root[data-theme="dark"] {
  --paper: #12151D; --card: #171B25; --ink: #EBE4D3; --ink-soft: #9A968A;
  --hairline: #262A36; --hairline-strong: #383D4B; --muted: #6A665A;
  --accent: #7AB693; --accent-soft: #1F2B23; --accent-tint: #1A241E;
  --wrong: #D07E67; --wrong-soft: #2E1D19; --wrong-tint: #241612;
  --chip: #21252F; --chip-active: #EBE4D3; --chip-active-ink: #12151D;
  --focus: #7AB693;
}
:root[data-theme="light"] {
  --paper: #F4EFE3; --card: #FBF8EF; --ink: #1B1E26; --ink-soft: #5A5E68;
  --hairline: #D5CDB8; --hairline-strong: #B8AE94; --muted: #8B8474;
  --accent: #2E6B47; --accent-soft: #DDE7D4; --accent-tint: #EEF2E5;
  --wrong: #A54934; --wrong-soft: #EED9CE; --wrong-tint: #F6E8DE;
  --chip: #E7DEC8; --chip-active: #1B1E26; --chip-active-ink: #F4EFE3;
  --focus: #2E6B47;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}
button { font-family: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
button:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; border-radius: 4px; }

.app { max-width: 960px; margin: 0 auto; padding: 24px 20px 120px; }

header.top {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; padding-bottom: 20px; border-bottom: 1px solid var(--hairline);
  margin-bottom: 20px; flex-wrap: wrap;
}
.brand { display: flex; align-items: baseline; gap: 10px; }
.brand h1 {
  margin: 0; font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
  font-size: 22px; font-weight: 600; letter-spacing: -0.01em;
}
.brand .sub {
  font-size: 11px; color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.14em; font-family: ui-monospace, "SF Mono", Menlo, monospace;
}
.controls { display: flex; align-items: center; gap: 8px; }
.pill {
  padding: 6px 12px; border: 1px solid var(--hairline-strong); border-radius: 999px;
  font-size: 12px; color: var(--ink-soft); background: transparent;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.pill:hover { border-color: var(--ink); color: var(--ink); }
.progress-badge {
  padding: 6px 12px; background: var(--card); border: 1px solid var(--hairline);
  border-radius: 999px; font-size: 12px;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-variant-numeric: tabular-nums;
}
.progress-badge .correct { color: var(--accent); font-weight: 600; }
.progress-badge .total { color: var(--muted); }

.chapters {
  display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 12px;
  margin-bottom: 24px; scrollbar-width: thin;
}
.chapters::-webkit-scrollbar { height: 4px; }
.chapters::-webkit-scrollbar-thumb { background: var(--hairline-strong); border-radius: 2px; }
.chapter-btn {
  flex-shrink: 0; padding: 8px 14px; border-radius: 8px;
  background: var(--card); border: 1px solid var(--hairline);
  font-size: 13px; color: var(--ink-soft);
  display: flex; flex-direction: column; align-items: flex-start; gap: 4px;
  min-width: 120px; text-align: left;
  transition: border-color 0.15s, background 0.15s;
}
.chapter-btn:hover { border-color: var(--hairline-strong); }
.chapter-btn[aria-current="true"] {
  background: var(--chip-active); color: var(--chip-active-ink);
  border-color: var(--chip-active);
}
.chapter-btn[aria-current="true"] .num { color: var(--chip-active-ink); }
.chapter-btn[aria-current="true"] .ch-title { color: var(--chip-active-ink); opacity: 0.85; }
.chapter-btn .num {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 10px; letter-spacing: 0.12em; color: var(--muted);
}
.chapter-btn .ch-title {
  font-size: 12px; line-height: 1.3; font-weight: 500;
  white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis;
}
.chapter-btn .ch-meta {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 10px; color: inherit; opacity: 0.7;
  font-variant-numeric: tabular-nums;
}

.eyebrow {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted);
}
.eyebrow .divider { flex: 1; height: 1px; background: var(--hairline); }
.eyebrow .q-num { color: var(--ink); font-weight: 600; font-variant-numeric: tabular-nums; }

.card {
  background: var(--card); border: 1px solid var(--hairline);
  border-radius: 12px; padding: 28px; margin-bottom: 20px;
}

.context {
  padding: 14px 16px; background: var(--paper); border-left: 3px solid var(--hairline-strong);
  border-radius: 4px; margin-bottom: 20px; font-size: 14px; color: var(--ink-soft);
  font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
  line-height: 1.5;
}
.context .label {
  display: block; font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 6px;
}

.stem {
  font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
  font-size: 19px; line-height: 1.55; color: var(--ink); margin-bottom: 24px;
  text-wrap: balance;
}

.options { display: flex; flex-direction: column; gap: 8px; }
.opt {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 14px 16px; border: 1px solid var(--hairline);
  background: var(--paper); border-radius: 8px;
  text-align: left; width: 100%; font-size: 15px; line-height: 1.5;
  transition: border-color 0.15s, background 0.15s;
}
.opt:hover:not(:disabled) { border-color: var(--hairline-strong); background: var(--accent-tint); }
.opt:disabled { cursor: default; }
.opt .letter {
  flex-shrink: 0; width: 26px; height: 26px; border-radius: 6px;
  background: var(--chip); color: var(--ink);
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 12px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  text-transform: uppercase;
}
.opt .text { flex: 1; padding-top: 3px; }
.opt .mark {
  flex-shrink: 0; width: 20px; height: 20px; opacity: 0;
  color: var(--accent); align-self: center;
}
.opt.correct { border-color: var(--accent); background: var(--accent-tint); }
.opt.correct .letter { background: var(--accent); color: var(--paper); }
.opt.correct .mark { opacity: 1; }
.opt.wrong { border-color: var(--wrong); background: var(--wrong-tint); }
.opt.wrong .letter { background: var(--wrong); color: var(--paper); }
.opt.wrong .mark { opacity: 1; color: var(--wrong); }
.opt.dim { opacity: 0.55; }

.note {
  margin-top: 18px; padding: 14px 16px;
  background: var(--accent-soft); border-radius: 8px;
  font-size: 13px; line-height: 1.55; color: var(--ink);
  border-left: 3px solid var(--accent);
}
.note .label {
  display: block; font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 6px; font-weight: 600;
}

/* Flashcard variant */
.card.flashcard .stem { font-size: 17px; }
.reveal-btn {
  padding: 10px 20px; border: 1px solid var(--hairline-strong);
  border-radius: 8px; font-size: 13px; color: var(--ink);
  background: var(--paper); transition: background 0.15s, border-color 0.15s;
  display: inline-flex; align-items: center; gap: 8px;
}
.reveal-btn:hover { background: var(--accent-tint); border-color: var(--accent); }
.answer {
  margin-top: 16px; padding: 16px 18px;
  background: var(--accent-tint); border: 1px solid var(--accent);
  border-radius: 8px;
  font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
  font-size: 17px; color: var(--ink); line-height: 1.5;
}
.answer .label {
  display: block; font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 6px; font-weight: 600;
}

footer.actions {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: color-mix(in oklab, var(--paper) 92%, transparent);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--hairline);
  padding: 14px 20px; z-index: 10;
}
.actions-inner {
  max-width: 960px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.nav-group { display: flex; align-items: center; gap: 8px; }
.nav-btn {
  padding: 10px 16px; border: 1px solid var(--hairline-strong);
  border-radius: 8px; font-size: 13px; color: var(--ink);
  background: var(--card); display: inline-flex; align-items: center; gap: 6px;
  transition: background 0.15s, border-color 0.15s;
  font-variant-numeric: tabular-nums;
}
.nav-btn:hover:not(:disabled) { background: var(--accent-tint); border-color: var(--accent); }
.nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.nav-btn.primary { background: var(--chip-active); color: var(--chip-active-ink); border-color: var(--chip-active); }
.nav-btn.primary:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); color: var(--paper); }
.q-indicator {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 12px; color: var(--muted);
  font-variant-numeric: tabular-nums; letter-spacing: 0.06em;
}
.q-indicator strong { color: var(--ink); font-weight: 600; }

.keys {
  display: flex; gap: 12px; font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 10px; color: var(--muted); letter-spacing: 0.08em;
  text-transform: uppercase; margin-top: 8px; justify-content: center;
}
.keys kbd {
  padding: 2px 6px; background: var(--card); border: 1px solid var(--hairline);
  border-radius: 3px; font-size: 10px; color: var(--ink-soft);
}

.empty {
  padding: 60px 20px; text-align: center; color: var(--muted);
  font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
  font-size: 17px;
}

@media (max-width: 640px) {
  .app { padding: 16px 12px 120px; }

  /* Header: stack vertically */
  header.top {
    flex-direction: column;
    align-items: stretch;
    gap: 12px;
    padding-bottom: 16px;
    margin-bottom: 16px;
  }
  .brand { flex-direction: column; gap: 2px; }
  .brand h1 { font-size: 18px; }
  .brand .sub { font-size: 10px; letter-spacing: 0.1em; }
  .controls {
    justify-content: flex-start;
    gap: 6px;
    flex-wrap: wrap;
  }
  .pill { padding: 5px 10px; font-size: 11px; }
  .progress-badge { padding: 5px 10px; font-size: 11px; }

  /* Chapters nav */
  .chapters { gap: 5px; margin-bottom: 16px; padding: 2px 0 10px; }
  .chapter-btn {
    min-width: 90px;
    padding: 6px 10px;
    border-radius: 6px;
  }
  .chapter-btn .num { font-size: 9px; }
  .chapter-btn .ch-title { font-size: 11px; max-width: 140px; }
  .chapter-btn .ch-meta { font-size: 9px; }

  /* Eyebrow */
  .eyebrow { gap: 8px; margin-bottom: 12px; font-size: 10px; }

  /* Card */
  .card { padding: 16px 14px; border-radius: 10px; margin-bottom: 14px; }

  /* Context block */
  .context { padding: 10px 12px; font-size: 13px; margin-bottom: 14px; }

  /* Question stem */
  .stem { font-size: 16px; line-height: 1.5; margin-bottom: 18px; }

  /* Options: touch-friendly */
  .options { gap: 6px; }
  .opt {
    gap: 10px;
    padding: 12px 12px;
    border-radius: 6px;
    font-size: 14px;
    line-height: 1.45;
  }
  .opt .letter {
    width: 24px; height: 24px;
    border-radius: 5px; font-size: 11px;
  }
  .opt .text { padding-top: 2px; }
  .opt .mark { width: 18px; height: 18px; }

  /* Note / explanation */
  .note { padding: 10px 12px; font-size: 12px; margin-top: 14px; }

  /* Flashcard */
  .card.flashcard .stem { font-size: 15px; }
  .reveal-btn { padding: 8px 16px; font-size: 12px; }
  .answer { padding: 12px 14px; font-size: 15px; margin-top: 12px; }

  /* Footer actions */
  footer.actions { padding: 10px 12px; }
  .actions-inner { gap: 8px; }
  .nav-btn { padding: 8px 12px; font-size: 12px; border-radius: 6px; gap: 4px; }
  .q-indicator { font-size: 11px; }
  .keys { display: none; }

  /* Empty state */
  .empty { padding: 40px 16px; font-size: 15px; }
}

/* Extra small screens (iPhone SE, etc.) */
@media (max-width: 380px) {
  .app { padding: 12px 10px 110px; }
  .brand h1 { font-size: 16px; }
  .brand .sub { display: none; }
  .card { padding: 14px 12px; }
  .stem { font-size: 15px; margin-bottom: 14px; }
  .opt { padding: 10px; gap: 8px; font-size: 13px; }
  .opt .letter { width: 22px; height: 22px; font-size: 10px; }
  .chapter-btn { min-width: 80px; padding: 5px 8px; }
  .chapter-btn .ch-title { font-size: 10px; max-width: 110px; }
  footer.actions { padding: 8px 10px; }
  .nav-btn { padding: 7px 10px; font-size: 11px; }
}
</style>

<div class="app">
  <header class="top">
    <div class="brand">
      <h1>Ôn tập MDLS</h1>
      <span class="sub">Miễn dịch học</span>
    </div>
    <div class="controls">
      <div class="progress-badge" id="progressBadge">
        <span class="correct">0</span><span class="total"> / 0</span>

      <button class="pill" id="shuffleBtn" title="Xáo trộn thứ tự (S)">Xáo</button>

      <button class="pill" id="themeBtn" title="Chuyển sáng/tối">◐</button>

  <nav class="chapters" id="chapters" aria-label="Chương"></nav>

  <footer class="actions">

<script type="text/plain" id="raw-source">
01 - Hàng rào miễn dịch tại các cơ quan

* Vai trò chủ yếu của các mảng Peyer thuộc hệ thống hạch lympho liên kết với niêm mạc đường tiêu hóa:
a. Sản xuất các dòng tế bào T độc tiêu diệt vi khuẩn ngoại bào.
b. Trình diện các kháng nguyên thức ăn để tạo ra đáp ứng viêm.
c. Biệt hóa các tế bào B thành tương bào sản xuất kháng thể IgA. @
d. Kích hoạt hệ thống bổ thể theo con đường cổ điển tại lòng ruột

* Cơ chế quan trọng giúp hệ miễn dịch đường ruột duy trì cân bằng với hệ vi khuẩn cộng sinh là:
a. Duy trì hàng rào niêm mạc, kiểm soát sự xâm nhập của vi sinh vật và thúc đẩy dung nạp miễn dịch. @
b. Tiêu diệt tất cả vi sinh vật ngay khi chúng tiếp xúc với bề mặt biểu mô ruột.
c. Tạo đáp ứng viêm mạnh kéo dài để loại bỏ hoàn toàn vi khuẩn trong lòng ruột.
d. Ngăn chặn toàn bộ kháng nguyên thức ăn và vi khuẩn tiếp xúc với hệ miễn dịch niêm mạc.

* Các thành phần tham gia hàng rào bảo vệ tại niêm mạc đường tiêu hóa bao gồm: (1) Lớp chất nhầy bao phủ bề mặt tế bào biểu mô. (2) Kháng thể IgA tiết trong dịch ruột. (3) Các peptide kháng khuẩn do tế bào biểu mô tiết ra. (4) Lớp tế bào sừng hóa dày ngăn cách nội môi với lòng ruột. (5) Hệ vi khuẩn cộng sinh trong lòng ruột.
a. 1, 2, 3, 4.
b. 1, 2, 3, 5. @
c. 1, 3, 4, 5.
d. 2, 3, 4, 5.

* Đặc điểm của tế bào B-1 tại niêm mạc và các khoang cơ thể là: (1) Có thể sản xuất các kháng thể tự nhiên với tính đa dạng hạn chế. (2) Chủ yếu tạo đáp ứng phụ thuộc tế bào T và hình thành trí nhớ miễn dịch mạnh. (3) Góp phần bảo vệ sớm chống lại một số vi khuẩn ngoại bào. (4) Bắt buộc cần tín hiệu hỗ trợ từ tế bào T để biệt hóa thành tương bào.
a. 1, 2.
b. 1, 3. @
c. 2, 3.
d. 3, 4.

* Cơ chế bảo vệ vật lý quan trọng nhất của đường hô hấp trên:
a. Hoạt động thực bào của các bạch cầu trung tính tại mũi.
b. Hệ thống nhầy - lông chuyển và các phản xạ cơ học như ho, hắt hơi. @
c. Sự sản sinh các protein kháng virus (interferon) của tế bào biểu mô.
d. Quá trình sừng hóa các tế bào niêm mạc để ngăn chặn virus xâm nhập.

* Tại các phế nang, loại tế bào đóng vai trò dọn dẹp là:
a. Các tế bào lympho B nhớ.
b. Các đại thực bào phế nang. @
c. Các tế bào tua gai (dendritic cells).
d. Các bạch cầu ái kiềm.

* Chức năng của hệ thống mô lympho liên quan đến phế quản: (1) Có cấu trúc và chức năng tương tự như các mảng Peyer ở ruột. (2) Là nơi tập trung các nang lympho nằm dọc theo các tiểu phế quản. (3) Chuyên sản xuất các tế bào NK để tiêu diệt trực tiếp vi khuẩn lao. (4) Giúp cơ thể tiếp xúc sớm với các kháng nguyên ngoại lai đường thở.
a. 1, 2, 4. @
b. 1, 3, 4.

c. Tủy xương là nơi khởi nguồn của tất cả các tiền thân lympho B và T, còn tuyến ức là môi trường biệt hóa và chọn lọc riêng cho dòng tế bào T. @
d. Cả hai cơ quan này đều duy trì kích thước ổn định và sản sinh liên tục các lympho bào ngây thơ mới trong suốt đời sống cá thể

02 - Dung nạp miễn dịch và bệnh tự miễn

* Dung nạp miễn dịch được định nghĩa là:
a. Sự mất khả năng nhận diện hoàn toàn các kháng nguyên từ môi trường bên ngoài.
b. Phản ứng viêm mạnh mẽ nhằm loại bỏ các tế bào biểu mô bị tổn thương của cơ thể.
c. Sự không đáp ứng đặc hiệu với một kháng nguyên do đã tiếp xúc với kháng nguyên đó trước đó. @
d. Khả năng tiêu diệt các dòng tế bào lympho có thụ thể với ái lực thấp đối với vật lạ.

* Cơ chế chính của dung nạp miễn dịch trung tâm đối với dòng tế bào lympho T tại tuyến ức là:
a. Sự bất hoạt chức năng (anergy) khi tế bào T gặp kháng nguyên tự thân tại các hạch ngoại vi.
b. Quá trình chỉnh sửa thụ thể (receptor editing) để thay đổi tính đặc hiệu của chuỗi nặng.
c. Sự chết tế bào theo chương trình (apoptosis) của các tế bào T có ái lực cao với kháng nguyên tự thân. @
d. Sự biệt hóa trực tiếp của các tế bào T ngây thơ thành các tương bào sản xuất kháng thể.

* Trạng thái bất hoạt chức năng (anergy) ở tế bào T ngoại vi xảy ra khi:
a. Tế bào T nhận diện đồng thời kháng nguyên và các phân tử đồng kích thích (B7).
b. Tế bào T nhận diện kháng nguyên nhưng thiếu sự hiện diện của các tín hiệu đồng kích thích. @
c. Tế bào T bị tiêu diệt ngay lập tức bởi các enzyme granzyme tiết ra từ tế bào NK.
d. Tế bào T di chuyển từ mạch bạch huyết vào các mô đặc quyền miễn dịch như mắt.

* Các cơ chế chính giúp duy trì sự dung nạp miễn dịch tại các mô ngoại vi bao gồm: (1) Sự bất hoạt chức năng (anergy). (2) Sự ức chế bởi tế bào T điều hòa (Tregs). (3) Sự chết tế bào theo chương trình (deletion). (4) Sự chỉnh sửa thụ thể (receptor editing).

* Hậu quả đối với hệ thống miễn dịch khi protein AIRE không được biểu hiện bình thường tại tuyến ức:
a. Tế bào B sẽ không thể thực hiện quá trình chuyển lớp chuỗi nặng sang IgG.
b. Các tế bào T tự phản ứng với kháng nguyên đặc hiệu mô sẽ thoát khỏi sự loại bỏ và ra ngoại vi. @
c. Hệ thống miễn dịch tự nhiên sẽ mất khả năng sản xuất các cytokine gây viêm như IL-1.
d. Các tế bào T điều hòa (Tregs) sẽ tăng sinh quá mức gây suy giảm miễn dịch hệ thống.

* Thuật ngữ "tự miễn dịch" (autoimmunity) dùng để chỉ tình trạng:
a. Phản ứng của hệ miễn dịch chống lại các mầm bệnh có cấu trúc phân tử phức tạp.
b. Phản ứng miễn dịch chống lại các kháng nguyên tự thân (autologous antigens). @
c. Sự suy giảm số lượng tế bào lympho T hỗ trợ do nhiễm virus gây ra.
d. Khả năng nhận diện chính xác và tiêu diệt các tế bào lạ xâm nhập vào cơ thể.

* Cơ chế "bắt chước phân tử" (molecular mimicry) dẫn đến bệnh tự miễn được giải thích là do:
a. Các tế bào tự thân thay đổi cấu trúc để giống với các loại virus gây bệnh.
b. Kháng nguyên của vi sinh vật có cấu trúc tương tự với kháng nguyên tự thân. @
c. Hệ thống bổ thể tự kích hoạt mà không cần sự hiện diện của các phức hợp miễn dịch.
d. Các tế bào thực bào nhầm lẫn giữa các hạt bụi vô cơ và các vi khuẩn gây hại.

* Nhiễm trùng và tổn thương mô được coi là những yếu tố nguy cơ dẫn tới bệnh tự miễn là do:
a. Chúng làm giảm khả năng sản xuất các kháng thể lớp IgA tại các bề mặt niêm mạc.
b. Chúng kích hoạt tế bào trình diện kháng nguyên bộc lộ các phân tử đồng kích thích. @
c. Chúng trực tiếp làm thay đổi trình tự gen mã hóa cho thụ thể của tế bào lympho T.
d. Chúng ngăn cản quá trình tái tuần hoàn của các tế bào lympho qua hạch ngoại vi.

* Các yếu tố có vai trò quan trọng trong cơ chế bệnh sinh của bệnh tự miễn bao gồm: (1) Các gen nhạy cảm, ví dụ một số alen HLA. (2) Các yếu tố môi trường, ví dụ nhiễm trùng hoặc tổn thương mô. (3) Sự thất bại của các cơ chế dung nạp miễn dịch với kháng nguyên tự thân. (4) Sự tăng hoạt động sinh lý bình thường của bổ thể trong đáp ứng miễn dịch tự nhiên.

* Bệnh lý tự miễn được phân loại là bệnh tự miễn đặc hiệu cơ quan:
a. Lupus ban đỏ hệ thống (SLE) gây tổn thương đa cơ quan.
b. Đái tháo đường típ 1 gây phá hủy các tế bào beta của đảo tụy. @
c. Viêm khớp dạng thấp (RA) gây tổn thương khớp và hệ thống.
d. Sốt thấp khớp gây tổn thương cả tim và các khớp lớn.

* Sự liên quan giữa alen HLA-B27 và bệnh viêm cột sống dính khớp là một ví dụ điển hình về:
a. Tác động của các hormone giới tính lên sự nhạy cảm với bệnh tự miễn.
b. Cơ chế dung nạp ngoại vi dựa trên các thụ thể ức chế như PD-1.
c. Sự đóng góp của các đa hình gen MHC vào nguy cơ mắc bệnh tự miễn. @
d. Vai trò của việc thiếu hụt protein bổ thể trong làm sạch phức hợp miễn dịch.

b. Sự thiếu hụt hoàn toàn các hàng rào vật lý như keratin trên da và niêm mạc.

a. Protein phản ứng C tăng cao trong huyết thanh.
b. Tự kháng thể đặc hiệu với kháng nguyên của cơ thể. @
c. Lysozyme trong dịch tiết niêm mạc đường hô hấp.
d. Các mảnh bổ thể không đặc hiệu trong huyết thanh.

* Xét nghiệm định danh alen HLA (như HLA-DR, HLA-DQ) có ý nghĩa lâm sàng là:
a. Chẩn đoán xác định bệnh nhân chắc chắn sẽ mắc bệnh tự miễn trong tương lai.
b. Đánh giá nguy cơ và sự nhạy cảm di truyền đối với một số bệnh tự miễn nhất định. @
c. Đo lường trực tiếp mức độ tổn thương mô tại các cơ quan bị tấn công.
d. Kiểm tra khả năng tiêu diệt virus của các tế bào T độc (CD8+) lưu hành

a. Cấy máu tìm vi khuẩn gây bệnh trong điều kiện hiếu khí.
b. Kỹ thuật miễn dịch đánh dấu như ELISA hoặc miễn dịch huỳnh quang. @
c. Đo tốc độ lắng hồng cầu để đánh giá mức độ viêm toàn thân.

* Một bệnh nhân thiếu C5-C9 bị nhiễm Neisseria tái diễn. Cơ chế bảo vệ bị giảm trực tiếp nhất là:

c. Tăng IgE do hen phế quản
d. Thiếu vitamin D đơn độc

</script>

<script>
// ── Parser ─────────────────────────────────────────────────────────────
function parseSource(raw) {
  const chapters = [];
  const parts = raw.split(/\n=+\n/);
  for (const block of parts) {
    const lines = block.split('\n');
    // find title line
    let titleIdx = -1;
    for (let i = 0; i < lines.length; i++) {
      const m = lines[i].match(/^(\d{2})\s*-\s*(.+)$/);
      if (m) { titleIdx = i; break; }
    }
    if (titleIdx < 0) continue;
    const titleMatch = lines[titleIdx].match(/^(\d{2})\s*-\s*(.+)$/);
    const chapterNum = titleMatch[1];
    const chapterTitle = titleMatch[2].trim();
    const body = lines.slice(titleIdx + 1).join('\n');
    const qBlocks = body.split(/(?:^|\n)\*\s+/).slice(1);
    const questions = [];
    for (const qb of qBlocks) {
      const parsed = parseQuestionBlock(qb);
      for (const q of parsed) {
        q.id = `${chapterNum}-${questions.length}`;
        questions.push(q);
      }
    }
    chapters.push({ num: chapterNum, title: chapterTitle, questions });
  }
  return chapters;
}

function parseQuestionBlock(text) {
  const lines = text.split('\n');
  const results = [];
  const OPT_RE = /^([a-eA-E])\.\s+(.+?)$/;
  const SUB_RE = /^\+\s+(.*)$/;
  const ARROW_RE = /^=>\s*(.+)$/;
  const NOTE_RE = /^\(!\)\s*(.*)$/;

  // Read stem up to first option / sub-question
  let i = 0;
  let stem = '';
  while (i < lines.length) {
    const l = lines[i];
    if (OPT_RE.test(l) || SUB_RE.test(l)) break;
    if (l.trim()) stem += (stem ? ' ' : '') + l.trim();
    i++;
  }
  stem = stem.trim();

  const rest = lines.slice(i);
  const hasDirectOptions = rest.some(l => OPT_RE.test(l));
  const hasSubBlocks = rest.some(l => SUB_RE.test(l));

  if (hasDirectOptions) {
    const q = buildMCQ(stem, rest);
    if (q) results.push(q);
  } else if (hasSubBlocks) {
    // Split into sub-blocks by "+ "
    const subs = [];
    let cur = null;
    for (const l of rest) {
      const m = l.match(SUB_RE);
      if (m) {
        if (cur) subs.push(cur);
        cur = { head: m[1], lines: [] };
      } else if (cur) {
        cur.lines.push(l);
      }
    }
    if (cur) subs.push(cur);

    for (const sub of subs) {
      // Sub-stem = head + any lines before options/arrow
      let subStem = sub.head.trim();
      let j = 0;
      while (j < sub.lines.length) {
        const l = sub.lines[j];
        if (OPT_RE.test(l) || ARROW_RE.test(l)) break;
        if (l.trim()) subStem += (subStem ? ' ' : '') + l.trim();
        j++;
      }
      const subRest = sub.lines.slice(j);
      const subHasOpts = subRest.some(l => OPT_RE.test(l));
      const arrowLine = subRest.find(l => ARROW_RE.test(l));

      if (subHasOpts) {
        const q = buildMCQ(subStem, subRest);
        if (q) {
          q.context = stem;
          results.push(q);
        }
      } else if (arrowLine) {
        const ans = arrowLine.match(ARROW_RE)[1];
        results.push({
          type: 'flashcard',
          context: stem,
          stem: subStem,
          answer: ans.trim()
        });
      }
    }
  }

  return results;
}

function buildMCQ(stem, restLines) {
  const OPT_RE = /^([a-eA-E])\.\s+(.+?)$/;
  const NOTE_RE = /^\(!\)\s*(.*)$/;
  const options = [];
  let note = '';
  let collectingNote = false;
  for (const raw of restLines) {
    const l = raw.replace(/\s+$/, '');
    const om = l.match(OPT_RE);
    if (om) {
      let txt = om[2];
      const correct = /\s@\s*$/.test(txt) || /@\s*$/.test(txt);
      txt = txt.replace(/\s*@\s*$/, '').trim();
      options.push({
        letter: om[1].toLowerCase(),
        text: txt,
        correct
      });
      collectingNote = false;
      continue;
    }
    const nm = l.match(NOTE_RE);
    if (nm) {
      note = nm[1].trim();
      collectingNote = true;
      continue;
    }
    if (collectingNote && l.trim()) {
      note += (note ? ' ' : '') + l.trim();
    }
  }
  if (!options.length) return null;
  if (!options.some(o => o.correct)) return null;
  return { type: 'mcq', stem, options, note };
}

// ── State ──────────────────────────────────────────────────────────────
const STORAGE_KEY = 'mdls-quiz-v1';
const state = {
  chapters: [],
  currentChapter: 0,
  currentIndex: 0,
  order: [],           // index order for current chapter (supports shuffle)
  revealed: false,     // flashcard reveal
  progress: {}         // { "chNum-qId": { picked: 'a', correct: bool } }
};

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state.progress = JSON.parse(raw) || {};
  } catch {}
}
function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress)); } catch {}
}

function currentChapter() { return state.chapters[state.currentChapter]; }
function currentQuestion() {
  const ch = currentChapter();
  if (!ch) return null;
  const idx = state.order[state.currentIndex];
  return ch.questions[idx];
}

function chapterProgress(chIdx) {
  const ch = state.chapters[chIdx];
  if (!ch) return { answered: 0, correct: 0, total: 0 };
  let answered = 0, correct = 0;
  for (const q of ch.questions) {
    const p = state.progress[q.id];
    if (p) { answered++; if (p.correct) correct++; }
  }
  return { answered, correct, total: ch.questions.length };
}

function totalProgress() {
  let a = 0, c = 0, t = 0;
  for (let i = 0; i < state.chapters.length; i++) {
    const p = chapterProgress(i);
    a += p.answered; c += p.correct; t += p.total;
  }
  return { answered: a, correct: c, total: t };
}

// ── Rendering ──────────────────────────────────────────────────────────
const $ = sel => document.querySelector(sel);

function renderChapters() {
  const nav = $('#chapters');
  nav.innerHTML = '';
  state.chapters.forEach((ch, i) => {
    const p = chapterProgress(i);
    const btn = document.createElement('button');
    btn.className = 'chapter-btn';
    if (i === state.currentChapter) btn.setAttribute('aria-current', 'true');
    btn.innerHTML = `
      <span class="num">CHƯƠNG ${ch.num}</span>
      <span class="ch-title">${escapeHtml(ch.title)}</span>
      <span class="ch-meta">${p.answered}/${p.total} · ${p.correct} đúng</span>
    `;
    btn.addEventListener('click', () => {
      state.currentChapter = i;
      state.currentIndex = 0;
      state.revealed = false;
      buildOrder();
      render();
    });
    nav.appendChild(btn);
  });
}

function buildOrder() {
  const ch = currentChapter();
  if (!ch) { state.order = []; return; }
  state.order = ch.questions.map((_, i) => i);
}
function shuffle() {
  const arr = state.order;
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  state.currentIndex = 0;
  state.revealed = false;
  render();
}

function renderQuestion() {
  const main = $('#main');
  const q = currentQuestion();
  const ch = currentChapter();
  if (!q || !ch) {
    main.innerHTML = `<div class="empty">Chưa có câu hỏi nào.</div>`;
    return;
  }

  const displayIdx = state.currentIndex + 1;
  const total = ch.questions.length;

  const eyebrow = `
    <div class="eyebrow">
      <span>Chương ${ch.num} · ${escapeHtml(ch.title)}</span>
      <span class="divider"></span>
      <span class="q-num">Câu ${displayIdx} / ${total}</span>
    </div>
  `;

  if (q.type === 'flashcard') {
    const ctx = q.context ? `<div class="context"><span class="label">Bối cảnh</span>${escapeHtml(q.context)}</div>` : '';
    main.innerHTML = `
      ${eyebrow}
      <div class="card flashcard">
        ${ctx}
        <div class="stem">${escapeHtml(q.stem)}</div>
        <div id="revealArea">
          ${state.revealed
            ? `<div class="answer"><span class="label">Đáp án</span>${escapeHtml(q.answer)}</div>`
            : `<button class="reveal-btn" id="revealBtn">Xem đáp án <span style="color:var(--muted); font-size:11px; margin-left:6px;">Space</span></button>`
          }
        </div>
      </div>
    `;
    if (!state.revealed) {
      $('#revealBtn').addEventListener('click', () => {
        state.revealed = true;
        renderQuestion();
      });
    }
    return;
  }

  // MCQ
  const picked = state.progress[q.id];
  const ctx = q.context ? `<div class="context"><span class="label">Bối cảnh</span>${escapeHtml(q.context)}</div>` : '';
  const optsHtml = q.options.map(opt => {
    let cls = 'opt';
    if (picked) {
      if (opt.correct) cls += ' correct';
      else if (picked.picked === opt.letter) cls += ' wrong';
      else cls += ' dim';
    }
    const mark = picked && opt.correct
      ? `<svg class="mark" viewBox="0 0 20 20" fill="none"><path d="M4 10.5l4 4 8-8.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`
      : picked && picked.picked === opt.letter && !opt.correct
      ? `<svg class="mark" viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>`
      : `<span class="mark"></span>`;
    return `
      <button class="${cls}" data-letter="${opt.letter}" ${picked ? 'disabled' : ''}>
        <span class="letter">${opt.letter}</span>
        <span class="text">${escapeHtml(opt.text)}</span>
        ${mark}
      </button>
    `;
  }).join('');

  const noteHtml = picked && q.note
    ? `<div class="note"><span class="label">Ghi chú</span>${escapeHtml(q.note)}</div>`
    : '';

  main.innerHTML = `
    ${eyebrow}
    <div class="card">
      ${ctx}
      <div class="stem">${escapeHtml(q.stem)}</div>
      <div class="options">${optsHtml}</div>
      ${noteHtml}
    </div>
  `;

  main.querySelectorAll('.opt').forEach(btn => {
    btn.addEventListener('click', () => {
      const letter = btn.dataset.letter;
      const opt = q.options.find(o => o.letter === letter);
      state.progress[q.id] = { picked: letter, correct: opt.correct };
      saveProgress();
      renderQuestion();
      renderChapters();
      renderTopProgress();
    });
  });
}

function renderTopProgress() {
  const p = totalProgress();
  const badge = $('#progressBadge');
  badge.innerHTML = `<span class="correct">${p.correct}</span><span class="total"> / ${p.total}</span>`;
}

function renderIndicator() {
  const ch = currentChapter();
  const total = ch ? ch.questions.length : 0;
  $('#qIndicator').innerHTML = `<strong>${total ? state.currentIndex + 1 : 0}</strong> / ${total}`;
  $('#prevBtn').disabled = state.currentIndex <= 0;
  $('#nextBtn').disabled = state.currentIndex >= total - 1;
}

function render() {
  renderChapters();
  renderQuestion();
  renderIndicator();
  renderTopProgress();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function next() {
  const ch = currentChapter();
  if (!ch) return;
  if (state.currentIndex < ch.questions.length - 1) {
    state.currentIndex++;
    state.revealed = false;
    render();
  }
}
function prev() {
  if (state.currentIndex > 0) {
    state.currentIndex--;
    state.revealed = false;
    render();
  }
}
function retryCurrent() {
  const q = currentQuestion();
  if (!q) return;
  if (state.progress[q.id]) {
    delete state.progress[q.id];
    saveProgress();
    render();
  }
}
function resetChapter() {
  const ch = currentChapter();
  if (!ch) return;
  if (!confirm(`Xoá tiến độ Chương ${ch.num} — ${ch.title}?`)) return;
  for (const q of ch.questions) delete state.progress[q.id];
  saveProgress();
  render();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

// ── Wiring ─────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const q = currentQuestion();
  if (e.key === 'ArrowRight') { e.preventDefault(); next(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
  else if (e.key === 'r' || e.key === 'R') { e.preventDefault(); retryCurrent(); }
  else if (e.key === 's' || e.key === 'S') { e.preventDefault(); shuffle(); }
  else if (e.key === ' ' && q && q.type === 'flashcard' && !state.revealed) {
    e.preventDefault();
    state.revealed = true;
    renderQuestion();
  }
  else if (/^[1-5]$/.test(e.key) && q && q.type === 'mcq' && !state.progress[q.id]) {
    const idx = parseInt(e.key) - 1;
    const opt = q.options[idx];
    if (opt) {
      state.progress[q.id] = { picked: opt.letter, correct: opt.correct };
      saveProgress();
      render();
    }
  }
});

$('#nextBtn').addEventListener('click', next);
$('#prevBtn').addEventListener('click', prev);
$('#shuffleBtn').addEventListener('click', shuffle);
$('#resetBtn').addEventListener('click', resetChapter);
$('#themeBtn').addEventListener('click', () => {
  const root = document.documentElement;
  const cur = root.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : cur === 'light' ? '' : 'dark';
  if (next) root.setAttribute('data-theme', next);
  else root.removeAttribute('data-theme');
  try { localStorage.setItem('mdls-theme', next); } catch {}
});

// Restore theme
try {
  const t = localStorage.getItem('mdls-theme');
  if (t) document.documentElement.setAttribute('data-theme', t);
} catch {}

// ── Init ───────────────────────────────────────────────────────────────
loadProgress();
const raw = document.getElementById('raw-source').textContent;
state.chapters = parseSource(raw);
buildOrder();
render();
</script>
